<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WordMasala – AI-powered text polisher. Write freely, we make it professional.">
    <title>WordMasala – AI Text Polisher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated background orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="page-wrapper">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">WordMasala</span>
            </div>
            <p class="tagline">Write freely. We'll make it professional.</p>
        </header>

        <!-- Main Card -->
        <main class="card">

            <!-- Tabs -->
            <div class="tabs" role="tablist">
                <button class="tab active" id="tab-polisher" role="tab" aria-selected="true" onclick="switchTab('polisher')">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 11l6-6 3.536 3.536-6 6H9v-3.536z"/></svg>
                    Polisher
                </button>
                <button class="tab" id="tab-history" role="tab" aria-selected="false" onclick="switchTab('history')">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    History
                </button>
            </div>

            <!-- Polisher Section -->
            <div id="polisherSection" class="section">

                <div class="input-group">
                    <label for="inputText" class="input-label">Your Text</label>
                    <textarea id="inputText" placeholder="yaar boss ne phir se kuch bola... uss pe email likhni hai 😤"></textarea>
                    <div class="char-counter"><span id="charCount">0</span> characters</div>
                </div>

                <div class="input-group">
                    <label for="tone" class="input-label">Select Tone</label>
                    <div class="select-wrapper">
                        <select id="tone">
                            <option value="Corporate Formal">🏢 Corporate Formal</option>
                            <option value="Polite Email">📧 Polite Email</option>
                            <option value="Professional WhatsApp">💬 Professional WhatsApp</option>
                            <option value="Apology Message">🙏 Apology Message</option>
                            <option value="Meeting Request">📅 Meeting Request</option>
                            <option value="Resume Bullet Point">📄 Resume Bullet Point</option>
                        </select>
                        <div class="select-arrow">
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                </div>

                <button id="convertBtn" class="btn btn-primary" onclick="convertText()">
                    <svg class="btn-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/></svg>
                    <span id="convertBtnText">Polish It</span>
                </button>

                <!-- Output Box -->
                <div class="output-box" id="outputBox">
                    <div class="output-header">
                        <span class="output-label">✦ Polished Output</span>
                        <div class="output-actions">
                            <button id="copyBtn" class="btn-icon-only" onclick="copyText()" title="Copy">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                            <button id="rewriteBtn" class="btn-icon-only" onclick="convertText()" title="Rewrite" style="display:none;">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                            </button>
                        </div>
                    </div>
                    <p id="outputText" class="output-text">Your polished text will appear here...</p>
                </div>

            </div>

            <!-- History Section -->
            <div id="historySection" class="section" style="display:none;">
                <div class="history-header">
                    <h3 class="section-title">Past Conversions</h3>
                    <span class="history-badge" id="historyBadge">0</span>
                </div>
                <div id="historyList" class="history-list">
                    <div class="empty-state">
                        <div class="empty-icon">🕐</div>
                        <p>No conversions yet.</p>
                        <span>Polish some text first!</span>
                    </div>
                </div>
            </div>

        </main>

        <footer class="footer">
            Built with <span class="heart">♥</span> using Gemini Flash
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
